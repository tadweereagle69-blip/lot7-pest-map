<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lot 7 AI Pest Risk Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    html, body { height: 100%; margin: 0; font-family: Arial, sans-serif; background:#f3f6fa; }
    #map { height: 100vh; width: 100%; }

    .top-panel {
      position: absolute; top: 12px; left: 50px; z-index: 1000;
      background: white; border-radius: 12px; padding: 12px 14px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.18); min-width: 280px;
      border-left: 5px solid #0b5cab;
    }
    .top-panel h2 { margin: 0; color:#0b5cab; font-size: 18px; }
    .top-panel p { margin: 6px 0 0; font-size: 12px; color:#444; }

    .legend {
      position: absolute; bottom: 24px; left: 12px; z-index: 1000;
      background:white; padding: 12px 14px; border-radius: 12px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.18); font-size: 13px;
    }
    .legend-title { font-weight:bold; margin-bottom:8px; color:#0b5cab; }
    .legend-row { display:flex; align-items:center; gap:8px; margin:5px 0; }
    .box { width:16px; height:16px; border-radius:4px; border:1px solid #777; }

    .popup-title { font-weight:bold; color:#0b5cab; font-size:15px; margin-bottom:6px; }
    .popup-row { margin:3px 0; font-size:13px; }
    .badge { padding:2px 7px; border-radius:10px; color:white; font-weight:bold; font-size:11px; }
    .small-note { color:#666; font-size:11px; margin-top:6px; }
  </style>
</head>

<body>
  <div id="map"></div>

  <div class="top-panel">
    <h2>Lot 7 AI Pest Risk Map</h2>
    <p>35 Operational Areas – Al Ain</p>
    <p id="status">Loading map data...</p>
  </div>

  <div class="legend">
    <div class="legend-title">Risk Color</div>
    <div class="legend-row"><span class="box" style="background:#2e7d32"></span> Green: Low</div>
    <div class="legend-row"><span class="box" style="background:#fbc02d"></span> Yellow: Moderate</div>
    <div class="legend-row"><span class="box" style="background:#f57c00"></span> Orange: Elevated</div>
    <div class="legend-row"><span class="box" style="background:#c62828"></span> Red: High / Suspend</div>
  </div>

<script>
const AREAS_GEOJSON_URL = 'areas.geojson';
const RISK_JSON_URL = 'lot7-risk-data.json';

const map = L.map('map').setView([24.10, 55.75], 10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

function normalizeName(name) {
  return String(name || '').trim().toUpperCase();
}

function colorFromRisk(item) {
  const color = String(item?.map_color || '').toLowerCase();
  const score = Number(item?.risk_score ?? 0);

  if (color === 'red' || score >= 81) return '#c62828';
  if (color === 'orange' || score >= 61) return '#f57c00';
  if (color === 'yellow' || score >= 31) return '#fbc02d';
  return '#2e7d32';
}

function badgeColor(value) {
  const v = String(value || '').toLowerCase();
  if (v.includes('high') || v.includes('suspend') || v.includes('red')) return '#c62828';
  if (v.includes('elevated') || v.includes('orange')) return '#f57c00';
  if (v.includes('moderate') || v.includes('caution') || v.includes('yellow')) return '#fbc02d';
  return '#2e7d32';
}

function popupHtml(areaName, risk) {
  if (!risk) {
    return `
      <div class="popup-title">${areaName}</div>
      <div class="popup-row">No risk data available.</div>
      <div class="small-note">Check lot7-risk-data.json area_name spelling.</div>
    `;
  }

  return `
    <div class="popup-title">${risk.area_name}</div>
    <div class="popup-row"><b>Area Group:</b> ${risk.area_group}</div>
    <div class="popup-row"><b>Mosquito Risk:</b> <span class="badge" style="background:${badgeColor(risk.mosquito_risk)}">${risk.mosquito_risk}</span></div>
    <div class="popup-row"><b>Fly Risk:</b> <span class="badge" style="background:${badgeColor(risk.fly_risk)}">${risk.fly_risk}</span></div>
    <div class="popup-row"><b>ULV Status:</b> <span class="badge" style="background:${badgeColor(risk.ulv_status)}">${risk.ulv_status}</span></div>
    <div class="popup-row"><b>Risk Score:</b> ${risk.risk_score}/100</div>
    <div class="popup-row"><b>Recommendation:</b> ${risk.recommendation || 'Routine monitoring'}</div>
  `;
}

Promise.all([
  fetch(AREAS_GEOJSON_URL).then(r => r.json()),
  fetch(RISK_JSON_URL).then(r => r.json())
]).then(([geojson, riskData]) => {
  const riskByArea = {};
  riskData.forEach(item => {
    riskByArea[normalizeName(item.area_name)] = item;
  });

  const layer = L.geoJSON(geojson, {
    style: feature => {
      const areaName = normalizeName(feature.properties?.name);
      const risk = riskByArea[areaName];
      const color = colorFromRisk(risk);
      return {
        color: color,
        fillColor: color,
        weight: 2,
        opacity: 0.95,
        fillOpacity: 0.48
      };
    },
    onEachFeature: (feature, layer) => {
      const rawName = String(feature.properties?.name || '').trim();
      const risk = riskByArea[normalizeName(rawName)];

      layer.bindPopup(popupHtml(rawName, risk));

      layer.on('mouseover', function () {
        this.setStyle({ weight: 4, fillOpacity: 0.65 });
      });

      layer.on('mouseout', function () {
        const color = colorFromRisk(risk);
        this.setStyle({ weight: 2, fillOpacity: 0.48, color, fillColor: color });
      });
    }
  }).addTo(map);

  map.fitBounds(layer.getBounds(), { padding: [20, 20] });

  const uniqueAreas = new Set(geojson.features.map(f => normalizeName(f.properties?.name)));
  document.getElementById('status').innerText =
    `Loaded ${uniqueAreas.size} areas and ${riskData.length} risk records.`;

}).catch(error => {
  console.error(error);
  document.getElementById('status').innerText = 'Error loading map data.';
});
</script>
</body>
</html>
